<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INTERVUEX - AI Interview Platform</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Body */
body{
    height:100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    display:flex;
    flex-direction:column;
}

/* Header */
header{
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    color:#00e6e6;
}

/* Hero Section */
.hero{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.content{
    max-width:700px;
}

/* Title */
.content h1{
    font-size:40px;
    margin-bottom:20px;
    line-height:1.3;
}

/* Description */
.content p{
    font-size:18px;
    color:#ccc;
    margin-bottom:30px;
}

/* Button */
.cta-btn{
    padding:12px 30px;
    font-size:16px;
    border:none;
    border-radius:30px;
    background:#00e6e6;
    color:black;
    cursor:pointer;
    transition:0.3s;
}

.cta-btn:hover{
    background:#00b3b3;
    transform:scale(1.05);
}

/* Watermark */
.watermark{
    position:absolute;
    bottom:20px;
    right:20px;
    font-size:80px;
    color:rgba(255,255,255,0.05);
    font-weight:bold;
    pointer-events:none;
}
</style>

</head>

<body>

<header>
    <h2 class="logo">INTERVUEX</h2>
</header>

<section class="hero">
    <div class="content">
        <h1>AI-Powered Smart Interview Platform</h1>
        <p>
            INTERVUEX enables intelligent candidate evaluation using 
            facial emotion recognition, voice stress detection, and 
            behavioral analysis to support unbiased hiring decisions.
        </p>

        <button onclick="location.href='role.html'" class="cta-btn">
            Proceed to Login
        </button>
    </div>
</section>

<div class="watermark">INTERVUEX</div>

</body>
</html>
