<script>
const API_BASE = "http://127.0.0.1:5000";

let questions = [];
let index = 0;

let mediaRecorder;
let audioChunks = [];

let faceEmotion = "Neutral";
let voiceEmotion = "Neutral";

let stream;
let timerInterval;
const QUESTION_TIME = 120; // 2 minutes per question

// Tracking variables for summary
// let questionStartTime = null;
// let totalInterviewTime = 0;
// let faceEmotions = [];
// let voiceEmotions = [];
// let confidenceScore = 50;

// 🔥 control flow
let resolveNext;

// ---------------- LOGOUT ----------------
function logout() {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
    }
    if (timerInterval) {
        clearInterval(timerInterval);
    }
    // stopLiveEmotionTracking();
    localStorage.clear();
    window.location.href = 'login.html';
}

// ---------------- START ----------------
async function startInterview() {

    const cid = document.getElementById("cid").value;
    const name = document.getElementById("name").value;

    if (!cid || !name) {
        alert("Enter all fields");
        return;
    }

    const res = await fetch(`${API_BASE}/get_questions/${cid}`);
    const data = await res.json();

    questions = data.questions || [];

    if (questions.length === 0) {
        alert("No questions assigned");
        return;
    }

    stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    video.srcObject = stream;

    mediaRecorder = new MediaRecorder(stream);

    // Collect audio chunks
    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) audioChunks.push(e.data);
    };

    // Start recording and keep it running
    mediaRecorder.start();

    document.getElementById('setup-section').classList.add('hidden');
    document.getElementById('interview-section').classList.remove('hidden');

    index = 0;
    startTimer();
    // startLiveEmotionTracking();
    showQuestion();
}

// ---------------- TIMER ----------------
function startTimer() {
    let timeLeft = QUESTION_TIME;
    
    if (timerInterval) clearInterval(timerInterval);
    
    updateTimerDisplay(timeLeft);
    
    timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay(timeLeft);
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            // Auto move to next question when time runs out
            if (index < questions.length) {
                nextQuestion();
            }
        }
    }, 1000);
}

function updateTimerDisplay(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    document.getElementById('timer-display').innerText = 
        `Time: ${mins}:${secs.toString().padStart(2, '0')}`;
}

// ---------------- SHOW ----------------
function showQuestion() {

    // Track time for previous question
    // if (questionStartTime !== null) {
    //     const timeSpent = QUESTION_TIME - parseInt(document.getElementById('timer-display').innerText.split(':')[1]);
    //     totalInterviewTime += timeSpent;
    // }
    // questionStartTime = Date.now();

    // Detect question category
    // const currentQuestion = questions[index] || "";
    // const category = detectCategory(currentQuestion);
    
    // // Show category badge
    // const categoryBadge = document.getElementById('category-badge');
    // if (categoryBadge) {
    //     categoryBadge.innerText = category;
    //     categoryBadge.style.display = 'inline-block';
    // }

    if (index >= questions.length) {

        document.getElementById("question-text").innerText = "All questions completed!";

        document.getElementById("next-btn").style.display = "none";
        document.getElementById("submit-btn").style.display = "inline-block";
        // document.getElementById("review-btn").style.display = "inline-block";
        document.getElementById("status").innerText = "Ready to submit";
        document.getElementById('timer-display').innerText = "Time: 0:00";
        
        // Update progress bar to 100%
        // document.getElementById('progress-bar').style.width = '100%';
        // document.getElementById('progress-text').innerText = `Question ${questions.length} of ${questions.length} (Completed)`;

        return;
    }

    document.getElementById("question-text").innerText =
        `Q${index+1}: ${questions[index]}`;

    document.getElementById("status").innerText = "Recording your answer...";
    document.getElementById("next-btn").disabled = false;

    // Update progress bar
    // const progress = ((index) / questions.length) * 100;
    // document.getElementById('progress-bar').style.width = progress + '%';
    // document.getElementById('progress-text').innerText = `Question ${index + 1} of ${questions.length}`;

    // Reset live emotions for new question
    // document.getElementById('live-face').innerText = 'Detecting...';
    // document.getElementById('live-voice').innerText = 'Detecting...';

    // Clear audio chunks for new answer (recorder keeps running)
    audioChunks = [];
    
    // Reset timer for new question
    startTimer();
}

// ---------------- NEXT ----------------
function nextQuestion() {

    if (index >= questions.length) return;

    document.getElementById("status").innerText = "Processing answer...";
    document.getElementById("next-btn").disabled = true;

    // Process the current answer
    processAnswer();
}

// ---------------- PROCESS ----------------
async function processAnswer() {
    try {
        await Promise.all([
            sendAudio(),
            captureFace()
        ]);
        
        // Track emotions for summary
        // faceEmotions.push(faceEmotion);
        // voiceEmotions.push(voiceEmotion);
        
        // Move to next question
        index++;
        showQuestion();
    } catch (err) {
        console.error("Process error:", err);
        document.getElementById("status").innerText = "Error processing. Try next.";
        document.getElementById("next-btn").disabled = false;
    }
}

// ---------------- AUDIO ----------------
function sendAudio() {
    return new Promise((resolve) => {

        if (audioChunks.length === 0) {
            resolve();
            return;
        }

        const blob = new Blob(audioChunks, { type: "audio/wav" });
        const reader = new FileReader();

        reader.onloadend = async () => {
            try {
                const res = await fetch(`${API_BASE}/voice`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ audio: reader.result })
                });

                const data = await res.json();
                voiceEmotion = data.emotion || "Neutral";

            } catch {}

            resolve();
        };

        reader.readAsDataURL(blob);
    });
}

// ---------------- FACE ----------------
async function captureFace() {

    try {
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        canvas.getContext("2d").drawImage(video, 0, 0);

        const res = await fetch(`${API_BASE}/face`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ image: canvas.toDataURL() })
        });

        const data = await res.json();
        faceEmotion = data.emotion || "Neutral";
        
        // Update live face emotion display
        // document.getElementById('live-face').innerText = faceEmotion;

    } catch {}
}

// ---------------- SUBMIT ----------------
async function submitInterview() {

    const cid = document.getElementById("cid").value;
    const name = document.getElementById("name").value;

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;

    canvas.getContext("2d").drawImage(video, 0, 0);

    const image = canvas.toDataURL("image/png");
    
    console.log("Submitting image, size:", image.length);

    try {
        const res = await fetch(`${API_BASE}/submit`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                candidate_id: cid,
                name: name,
                face_emotion: faceEmotion,
                voice_emotion: voiceEmotion,
                image: image
            })
        });

        const data = await res.json();
        console.log("Submit response:", data);
        
        alert("✅ Interview submitted successfully!");
        
        if (stream) stream.getTracks().forEach(t => t.stop());
        // stopLiveEmotionTracking();
        
        // Show completion section
        document.getElementById('interview-section').classList.add('hidden');
        document.getElementById('complete-section').classList.remove('hidden');
        
        // Display interview summary
        // displaySummary();
    } catch (err) {
        console.error("Submit error:", err);
        alert("Error submitting interview");
    }
}
