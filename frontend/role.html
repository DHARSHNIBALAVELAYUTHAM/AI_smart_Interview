<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Select Role - INTERVUEX</title>

<style>
/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* Body */
body{
    height:100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color:white;
    display:flex;
    flex-direction:column;
}

/* Header */
header{
    padding:20px 40px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    letter-spacing:2px;
    color:#00e6e6;
}

/* Main Section */
.main{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Title */
.main h1{
    font-size:36px;
    margin-bottom:40px;
}

/* Cards Container */
.cards{
    display:flex;
    gap:40px;
}

/* Card */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:15px;
    width:280px;
    transition:0.3s;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* Hover Effect */
.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px rgba(0,230,230,0.3);
}

/* Card Title */
.card h3{
    font-size:22px;
    margin-bottom:15px;
    color:#00e6e6;
}

/* Card Text */
.card p{
    font-size:15px;
    color:#ccc;
    margin-bottom:20px;
}

/* Button */
.card button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#00e6e6;
    color:black;
    cursor:pointer;
    transition:0.3s;
}

.card button:hover{
    background:#00b3b3;
    transform:scale(1.05);
}

/* Watermark */
.watermark{
    position:absolute;
    bottom:20px;
    right:30px;
    font-size:70px;
    color:rgba(255,255,255,0.05);
    font-weight:bold;
}
</style>

</head>

<body>

<header>
    <h2 class="logo">INTERVUEX</h2>
</header>

<div class="main">
    <h1>Select Your Role</h1>

    <div class="cards">

        <!-- HR -->
        <div class="card">
            <h3>HR Panel</h3>
            <p>
                Access interview dashboard, manage candidates, 
                set questions, and view AI analysis results.
            </p>
            <button onclick="goHR()">Continue as HR</button>
        </div>

        <!-- Candidate -->
        <div class="card">
            <h3>Candidate</h3>
            <p>
                Attend AI-powered interview with real-time 
                face & voice analysis.
            </p>
            <button onclick="goCandidate()">Continue as Candidate</button>
        </div>

    </div>
</div>

<div class="watermark">INTERVUEX</div>

<script>
function goHR(){
    window.location.href = "login.html?role=hr";
}

function goCandidate(){
    window.location.href = "login.html?role=candidate";
}
</script>

</body>
</html>
